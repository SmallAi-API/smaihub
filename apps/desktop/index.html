<!doctype html>
<html class="desktop">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: inherit;
        gap: 12px;
      }
      @keyframes loading-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .loading-spinner {
        width: 24px;
        height: 24px;
        border: 2px solid rgba(0, 0, 0, 0.15);
        border-top-color: #1f1f1f;
        border-radius: 50%;
        animation: loading-spin 1s linear infinite;
      }
      html[data-theme='dark'] .loading-spinner {
        border-color: rgba(255, 255, 255, 0.15);
        border-top-color: #f0f0f0;
      }
    </style>
  </head>
  <body style="height: 100%">
    <script>
      (function () {
        var theme = 'system';
        try {
          theme = localStorage.getItem('theme') || 'system';
        } catch (_) {}
        var systemTheme =
          window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        var resolvedTheme = theme === 'system' ? systemTheme : theme;
        if (resolvedTheme === 'dark' || resolvedTheme === 'light') {
          document.documentElement.setAttribute('data-theme', resolvedTheme);
        }
        // Renderer-side reloads (Cmd+R / webContents.reload) don't go through
        // the main process's `?lng=` injection, so prefer the i18next cache —
        // the actual user setting persisted by the language switcher — before
        // falling back to the URL param or navigator detection.
        var urlParams = new URLSearchParams(window.location.search);
        var locale;
        try {
          locale = localStorage.getItem('i18nextLng');
        } catch (_) {}
        if (!locale) locale = urlParams.get('lng') || navigator.language || 'en-US';
        document.documentElement.lang = locale;
        var rtl = ['ar', 'arc', 'dv', 'fa', 'ha', 'he', 'khw', 'ks', 'ku', 'ps', 'ur', 'yi'];
        document.documentElement.dir =
          rtl.indexOf(locale.split('-')[0].toLowerCase()) >= 0 ? 'rtl' : 'ltr';
      })();
    </script>
    <div id="loading-screen">
      <div aria-label="Loading" role="status">
        <div class="loading-spinner"></div>
      </div>
    </div>
    <div id="root" style="height: 100%"></div>
    <script>
      window.__SERVER_CONFIG__ = undefined;
    </script>
    <script type="module" src="../../src/spa/entry.desktop.tsx"></script>
  </body>
</html>
